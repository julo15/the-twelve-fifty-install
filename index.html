<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="robots" content="noindex, nofollow" />
<title>For Jason — The VoiceInk Saga 💸</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,600&family=Playfair+Display:ital,wght@0,600;0,800;1,600;1,800&display=swap" rel="stylesheet">
<style>
  :root{ --gold:#f4d27a; --gold-hi:#fff4cf; --gold-deep:#b9892f; --ink:#f1ecdf; --muted:#c8bfa6; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Cormorant Garamond",Georgia,serif; background:#05060c; color:var(--ink);
    min-height:100%; overflow:hidden; position:relative; -webkit-font-smoothing:antialiased;
    cursor:pointer; user-select:none; -webkit-user-select:none; -webkit-tap-highlight-color:transparent;
  }
  .bg{position:fixed; inset:-20%; z-index:0; filter:blur(8px);
      background:
        radial-gradient(40% 50% at 25% 20%, rgba(120,90,200,.35), transparent 60%),
        radial-gradient(45% 55% at 80% 25%, rgba(60,120,210,.30), transparent 60%),
        radial-gradient(60% 60% at 50% 95%, rgba(180,140,60,.30), transparent 65%),
        radial-gradient(120% 120% at 50% 0%, #161a35 0%, #0a0c18 55%, #05060c 100%);
      animation:drift 16s ease-in-out infinite alternate;}
  @keyframes drift{from{transform:translate3d(-2%,-1%,0) scale(1.02)} to{transform:translate3d(2%,2%,0) scale(1.08)}}
  .vignette{position:fixed; inset:0; z-index:1; pointer-events:none;
    background:radial-gradient(75% 75% at 50% 42%, transparent 55%, rgba(0,0,0,.55) 100%);}
  canvas#fx{position:fixed; inset:0; z-index:30; pointer-events:none}

  /* progress bar */
  .pbar{position:fixed; top:0; left:0; height:3px; width:0%; z-index:20;
    background:linear-gradient(90deg,var(--gold-deep),var(--gold),var(--gold-hi));
    box-shadow:0 0 12px rgba(244,210,122,.6); transition:width .5s cubic-bezier(.3,.8,.3,1)}

  /* slide */
  .wrap{position:fixed; inset:0; z-index:10; display:flex; align-items:center; justify-content:center; padding:34px 22px 92px; overflow-y:auto; -webkit-overflow-scrolling:touch}
  .wrap.tall{align-items:flex-start}
  #card{width:min(94vw,620px); text-align:center; opacity:1; transform:translateY(0);
    transition:opacity .24s ease, transform .24s cubic-bezier(.2,.8,.2,1)}
  #card.out{opacity:0; transform:translateY(10px)}

  .crest{font-size:clamp(12px,3.2vw,15px); letter-spacing:.4em; text-transform:uppercase; color:var(--muted); margin-bottom:6px}
  .rule{display:flex; align-items:center; justify-content:center; gap:14px; margin:12px auto; color:var(--gold)}
  .rule::before,.rule::after{content:""; height:1px; width:60px; background:linear-gradient(90deg,transparent,var(--gold))}
  .rule::after{background:linear-gradient(90deg,var(--gold),transparent)}
  .rule span{font-size:17px}
  .foil{font-family:"Playfair Display",serif; font-weight:800;
    background:linear-gradient(100deg,#9c7322 0%,#f4d27a 22%,#fff4cf 38%,#f4d27a 54%,#a9791f 78%,#f4d27a 100%);
    background-size:250% 100%; -webkit-background-clip:text; background-clip:text; color:transparent;
    animation:shimmer 5.5s linear infinite; text-shadow:0 2px 18px rgba(244,210,122,.18);}
  @keyframes shimmer{to{background-position:250% 0}}
  .title{font-size:clamp(24px,6.6vw,36px); line-height:1.18}
  .name{font-size:clamp(56px,17vw,112px); line-height:1; margin:6px 0}
  .crown{font-size:clamp(28px,9vw,44px); display:block; margin-bottom:-2px}
  .sub{font-size:clamp(21px,5.8vw,28px); line-height:1.5; color:#e7dfca; font-weight:500}
  .dollar{font-family:"Playfair Display",serif; font-weight:800; font-style:italic; color:var(--gold);
    font-size:1.16em; text-shadow:0 2px 14px rgba(244,210,122,.4)}

  .chapter{font-size:clamp(11px,3vw,13px); letter-spacing:.38em; text-transform:uppercase; color:var(--gold-deep); margin-bottom:20px}
  .beat{font-family:"Playfair Display",serif; font-style:italic; font-weight:600;
    font-size:clamp(23px,6.2vw,33px); line-height:1.42; color:#efe7d2; max-width:560px; margin:0 auto}
  .ticker{margin-top:30px; font-family:"SF Mono",ui-monospace,Menlo,monospace; font-size:clamp(12px,3.3vw,15px); color:#7d86a8}
  .ticker b{color:var(--gold)}
  .big{font-family:"Playfair Display",serif; font-weight:800; font-size:clamp(30px,8vw,46px); line-height:1.2}
  .drum{font-size:clamp(40px,12vw,64px); margin-bottom:10px}

  /* reveal */
  .label{font-size:clamp(12px,3.2vw,14px); text-transform:uppercase; letter-spacing:.4em; color:var(--gold-deep); margin-bottom:16px}
  .plaque{position:relative; display:inline-block; max-width:100%; padding:24px 22px; border-radius:18px;
    background:linear-gradient(180deg,#13162e,#0b0d1d); border:1px solid rgba(244,210,122,.5);
    box-shadow:0 30px 80px rgba(0,0,0,.6),0 0 0 1px rgba(244,210,122,.12),0 0 60px rgba(244,210,122,.18),inset 0 1px 0 rgba(255,255,255,.06); overflow:hidden}
  .plaque::before{content:""; position:absolute; top:0; left:-60%; width:50%; height:100%;
    background:linear-gradient(100deg,transparent,rgba(255,255,255,.22),transparent); transform:skewX(-18deg); animation:sweep 4.5s ease-in-out 1s infinite}
  @keyframes sweep{0%{left:-60%}55%{left:120%}100%{left:120%}}
  .corner{position:absolute; color:var(--gold); font-size:14px; opacity:.8}
  .corner.tl{top:8px;left:11px} .corner.tr{top:8px;right:11px} .corner.bl{bottom:8px;left:11px} .corner.br{bottom:8px;right:11px}
  .cmd{font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace; font-size:clamp(9.5px,2.7vw,15px);
    color:var(--gold-hi); text-align:left; line-height:1.95; text-shadow:0 0 18px rgba(244,210,122,.4)}
  .cmd > div{white-space:normal; overflow-wrap:break-word; word-break:normal}
  .cmd .p{color:#7fe9b0; margin-right:.4ch}
  .deadpan{margin-top:18px; font-size:clamp(18px,5vw,24px); font-style:italic; color:#e7dfca}
  .receipt{margin-top:18px; font-size:clamp(15px,4vw,19px); color:var(--muted); line-height:1.85}
  .receipt .strike{text-decoration:line-through; opacity:.6}
  .receipt .pd{font-family:"Playfair Display",serif; font-style:italic; color:var(--ink)}
  .btn{margin-top:26px; position:relative; overflow:hidden; appearance:none; cursor:pointer;
    font-family:"Cormorant Garamond",serif; font-size:clamp(17px,4.8vw,22px); font-weight:700; letter-spacing:.02em; color:#2a1d00;
    background:linear-gradient(180deg,#fff4cf,#f4d27a 45%,#d9a93f); border:none; border-radius:999px; padding:15px 34px;
    box-shadow:0 14px 34px rgba(217,169,63,.45), inset 0 1px 0 rgba(255,255,255,.7); transition:transform .12s ease, box-shadow .12s ease}
  .btn::after{content:""; position:absolute; top:0; left:-70%; width:55%; height:100%;
    background:linear-gradient(100deg,transparent,rgba(255,255,255,.75),transparent); transform:skewX(-18deg); animation:sweep 3.2s ease-in-out .6s infinite}
  .btn:active{transform:translateY(1px) scale(.99)}
  .footer{margin-top:22px; font-size:clamp(14px,3.6vw,17px); color:#9a916f; font-style:italic}
  .heart{color:#ff8da6; font-style:normal}

  /* TAP CUE */
  #tapcue{position:fixed; left:50%; bottom:30px; transform:translateX(-50%); z-index:18; text-align:center; pointer-events:none;
    transition:opacity .3s ease}
  #tapcue.hide{opacity:0}
  .tap-pill{display:inline-flex; align-items:center; gap:9px; padding:11px 22px; border-radius:999px;
    background:rgba(244,210,122,.10); border:1px solid rgba(244,210,122,.45); color:var(--gold-hi);
    font-size:clamp(14px,4vw,17px); letter-spacing:.06em; backdrop-filter:blur(6px);
    box-shadow:0 6px 26px rgba(0,0,0,.4), 0 0 18px rgba(244,210,122,.12); animation:pulse 1.5s ease-in-out infinite}
  .tap-pill .hand{font-size:1.15em; animation:tapbob 1.5s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 6px 26px rgba(0,0,0,.4),0 0 0 0 rgba(244,210,122,.30)}
                   50%{box-shadow:0 6px 26px rgba(0,0,0,.4),0 0 0 12px rgba(244,210,122,0)}}
  @keyframes tapbob{0%,100%{transform:translateY(0)} 50%{transform:translateY(4px)}}
  .chev{margin-left:1px; opacity:.9; animation:chev 1.5s ease-in-out infinite}
  @keyframes chev{0%,100%{transform:translateX(0)} 50%{transform:translateX(4px)}}
</style>
</head>
<body>
<div class="bg"></div>
<div class="vignette"></div>
<canvas id="fx"></canvas>
<div class="pbar" id="pbar"></div>

<div class="wrap"><div id="card"></div></div>

<div id="tapcue">
  <div class="tap-pill"><span class="hand">👆</span> Tap to continue <span class="chev">›</span></div>
</div>

<script>
const CMD = "git clone https://github.com/Beingpax/VoiceInk\ncd VoiceInk\nmake local";

/* odyssey chapters: [roman, text, tabs, time] */
const beats = [
  ["I",    "It began, as all great quests do, with a single Google search.", 2, "5 minutes"],
  ["II",   "The official website was found. It politely asked for $39. 💸", 4, "11 minutes"],
  ["III",  "We read the entire README. 📜 Every word. There were many.", 7, "26 minutes"],
  ["IV",   "We descended into the GitHub Issues, where no thread is ever resolved.", 11, "52 minutes"],
  ["V",    "Stack Overflow closed our question as a duplicate. ⚰️", 14, "1 hour"],
  ["VI",   "Homebrew offered a one-liner — but it’s the same $39 trial in disguise. We pressed on, for you.", 19, "2 hours"],
  ["VII",  "Then we learned the truth: the code is open-source. You can build it yourself. For free. Forever.", 24, "3 hours"],
  ["VIII", "We aged. We grew wise. We forgot why we had started.", 31, "5 hours"],
  ["IX",   "And then — the free path revealed itself, where it had waited all along…", 38, "6 hours"],
];

const chapter = ([r,t,tabs,time]) => ({
  html:`<div class="chapter">The Quest · Chapter ${r}</div>
        <div class="beat">${t}</div>
        <div class="ticker">Browser tabs open: <b>${tabs}</b> &nbsp;·&nbsp; Time elapsed: <b>${time}</b></div>`
});

const steps = [
  { html:`<div class="crest">By Royal Decree · An Official Proclamation</div>
          <div class="rule"><span>✦</span></div>
          <div class="title foil">The Official VoiceInk<br>Certificate of Installation</div>` },
  { html:`<div class="crest" style="letter-spacing:.3em; margin-bottom:10px">Issued, with great ceremony, unto</div>
          <span class="crown">👑</span><div class="name foil">Jason</div>`,
    show:()=>burst(70,280) },
  { html:`<div class="sub">You asked one humble question —<br><em>“how do I install VoiceInk?”</em><br>and sent an oddly specific <span class="dollar">$12.50</span> by Venmo.</div>` },
  { html:`<div class="sub">What followed<br>was an <em>odyssey.</em></div>` },
  ...beats.map(chapter),
  { html:`<div class="drum">🥁</div><div class="big foil">…and at last,<br>the answer.</div>`,
    show:()=>grandBurst() },
  { reveal:true,
    html:`<div class="label">After all of that — your deliverable</div>
      <div class="plaque">
        <span class="corner tl">✦</span><span class="corner tr">✦</span><span class="corner bl">✦</span><span class="corner br">✦</span>
        <div class="cmd">
          <div><span class="p">$</span> git clone https://github.com/<wbr>Beingpax/<wbr>VoiceInk</div>
          <div><span class="p">$</span> cd VoiceInk</div>
          <div><span class="p">$</span> make local</div>
        </div>
      </div>
      <div class="deadpan">…that’s it. Build it yourself — <em>free forever.</em></div>
      <div class="receipt">
        Bespoke installation consultancy … <span class="dollar">$12.50</span><br>
        The commands themselves … <span class="strike">priceless</span> <span class="pd">complimentary</span><br>
        The $39 license you did <em>not</em> have to buy … <span class="pd">you’re welcome</span> 💸
      </div>
      <button class="btn" id="copy">📋 &nbsp;Copy your $12.50 commands</button>
      <div class="footer">Paste in Terminal, one line at a time.<br>A pleasure doing business, friend <span class="heart">♥</span></div>`,
    show:()=>{ grandBurst();
      const fallbackCopy=()=>{ const t=document.createElement('textarea'); t.value=CMD; t.style.position='fixed'; t.style.opacity='0';
        document.body.appendChild(t); t.focus(); t.select(); try{document.execCommand('copy');}catch(_){} t.remove(); };
      document.getElementById('copy').addEventListener('click',e=>{
        e.stopPropagation();
        const btn=e.currentTarget, r=btn.getBoundingClientRect(), bx=r.left+r.width/2, by=r.top+r.height/2;
        // celebrate + confirm immediately — never gated behind the clipboard call
        btn.innerHTML='✅ &nbsp;Copied! Six hours, well spent.';
        spawn(180,r.width,bx,by); setTimeout(()=>spawn(140,640,bx,by),150); setTimeout(()=>spawn(110,760,W/2,H*0.28),340);
        // fire-and-forget copy with fallback
        try{ if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(CMD).catch(fallbackCopy); } else { fallbackCopy(); } }
        catch(_){ fallbackCopy(); }
      }); } },
];

let i=-1, busy=false;
const card=document.getElementById('card'), cue=document.getElementById('tapcue'), pbar=document.getElementById('pbar');
const wrapEl=document.querySelector('.wrap');
function fitCheck(){
  // if a slide is taller than the viewport, top-align it (so the TOP — the command — is visible)
  const tall = card.scrollHeight > wrapEl.clientHeight + 4;
  wrapEl.classList.toggle('tall', tall);
  if(tall) wrapEl.scrollTop = 0;
}
function render(){
  const s=steps[i];
  card.innerHTML=s.html;
  pbar.style.width=(i/(steps.length-1))*100+'%';
  cue.classList.toggle('hide', !!s.reveal || i===steps.length-1);
  if(s.show) s.show();
  fitCheck();
}
addEventListener('resize', ()=>{ if(typeof fitCheck==='function') fitCheck(); });
function advance(){
  if(busy) return;
  if(i>=0 && steps[i] && steps[i].reveal) return;   // last slide: taps do nothing
  if(i>=steps.length-1) return;
  busy=true;
  if(i<0){ i=0; render(); busy=false; return; }
  card.classList.add('out');
  setTimeout(()=>{ i++; render(); card.classList.remove('out'); setTimeout(()=>busy=false,60); }, 240);
}
document.addEventListener('click', advance);
document.addEventListener('keydown', e=>{ if(e.key===' '||e.key==='Enter'||e.key==='ArrowRight') advance(); });
advance(); // show first slide

/* ---------- confetti + gold motes ---------- */
const cv=document.getElementById('fx'), ctx=cv.getContext('2d');
let W,H,parts=[],motes=[];
function resize(){ W=cv.width=innerWidth; H=cv.height=innerHeight; }
resize(); addEventListener('resize',resize);
const COLORS=['#f4d27a','#fff4cf','#ffd76b','#ff9eb6','#9ad7ff','#d8c3ff','#fff'];
for(let k=0;k<46;k++) motes.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,
  r:.6+Math.random()*1.8, vy:-.12-Math.random()*.30, vx:(Math.random()-.5)*.25, a:.2+Math.random()*.6, tw:Math.random()*6.28});
function spawn(n,spread,cx,cy){ cx=cx??W/2; cy=cy??H*0.34;
  for(let k=0;k<n;k++) parts.push({x:cx+(Math.random()-.5)*spread, y:cy+(Math.random()-.5)*40,
    vx:(Math.random()-.5)*10, vy:Math.random()*-12-4, g:.27+Math.random()*.14, s:5+Math.random()*8,
    rot:Math.random()*6.28, vr:(Math.random()-.5)*.32, c:COLORS[(Math.random()*COLORS.length)|0], life:0}); }
const burst=(n=70,s=260)=>spawn(n,s);
const grandBurst=()=>{ spawn(150,520); setTimeout(()=>spawn(120,640),180); setTimeout(()=>spawn(90,720),380); };
function tick(){
  ctx.clearRect(0,0,W,H);
  motes.forEach(m=>{ m.y+=m.vy; m.x+=m.vx; m.tw+=.05; if(m.y<-6){m.y=H+6; m.x=Math.random()*W;}
    const fl=m.a*(0.55+0.45*Math.sin(m.tw)); ctx.beginPath(); ctx.fillStyle=`rgba(244,210,122,${fl})`; ctx.arc(m.x,m.y,m.r,0,6.28); ctx.fill(); });
  parts.forEach(p=>{ p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.life++;
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle=p.c; ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6); ctx.restore(); });
  parts=parts.filter(p=>p.y<H+40 && p.life<420);
  requestAnimationFrame(tick);
}
tick();
</script>
</body>
</html>
